<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
</head>
<body>
    <h1>switch statement</h1>

    <script>
        let team = "Red";

        switch(team){
            case "Red" :
                alert("Go Red Bulldogs!");
                break;
            case "Blue" :
                alert("Go Bluebears!");
                break;
            case "Green" :
                alert("Go Greenhornets!");
                break;
            case "Yellow" :
                alert("Go Yellowtigers!");
                break;
            default:
                alert("Team could not be found");
        }
    </script>

</body>
</html>
